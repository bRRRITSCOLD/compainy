name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine bump type
        id: bump
        run: |
          set -euo pipefail
          SUBJECT=$(printf '%s' "${{ github.event.head_commit.message }}" | head -1)
          if echo "$SUBJECT" | grep -qE 'BREAKING' || echo "$SUBJECT" | grep -qE '^[a-z]+!:'; then
            BUMP=major
          elif echo "$SUBJECT" | grep -qE '^feat'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Bump version
        id: version
        run: |
          set -euo pipefail
          NEW=$(node scripts/ci/bump-version.mjs "${{ steps.bump.outputs.bump }}")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      - name: Validate plugin
        run: node scripts/ci/validate.mjs

      - name: Commit and push version bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore(release): v${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --generate-notes
